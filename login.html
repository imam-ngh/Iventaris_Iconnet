<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Iconnet Inventory</title>
    
    <!-- Google Fonts - Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Login Page -->
    <div class="login-page" id="loginPage">
        <!-- Dynamic Background Elements -->
        <div class="bg-shape shape-1"></div>
        <div class="bg-shape shape-2"></div>
        <div class="bg-shape shape-3"></div>
        
        <div class="login-card">
            <div class="login-logo animate-fade-in">
                <img src="img/logo.png" alt="Iconnet" class="login-logo-img">
                <h1 class="brand-name">ICONNET</h1>
                <p class="tagline">Sistem Manajemen Inventaris Pro</p>
            </div>
            
            <div class="login-error" id="loginError">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorMessage">Username atau password salah!</span>
            </div>
            
            <form id="loginForm" class="animate-slide-up">
                <div class="form-group stagger-1">
                    <label>Username</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" placeholder="Masukkan username" required>
                        <i class="fas fa-user"></i>
                    </div>
                </div>
                
                <div class="form-group stagger-2">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="Masukkan password" required>
                        <i class="fas fa-lock"></i>
                        <button type="button" class="password-toggle" id="passwordToggle">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <div class="form-options stagger-3">
                    <label class="remember-me">
                        <input type="checkbox" id="remember">
                        <span>Ingat saya</span>
                    </label>
                    <a href="#" class="forgot-password">Lupa password?</a>
                </div>
                
                <button type="submit" class="login-btn stagger-4">
                    <span>Masuk ke Dashboard</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>
            
            <div class="login-footer animate-fade-in">
                <p>&copy; 2026 Iconnet Inventory System</p>
            </div>
        </div>
    </div>

    <script>
        // Password toggle functionality
        const passwordToggle = document.getElementById('passwordToggle');
        const passwordInput = document.getElementById('password');

        passwordToggle.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            passwordToggle.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
        });

        // Login functionality
        const loginForm = document.getElementById('loginForm');
        const loginError = document.getElementById('loginError');

        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Add loading state
            const submitBtn = this.querySelector('.login-btn');
            const originalBtnContent = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memproses...';
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    // Success animation
                    submitBtn.innerHTML = '<i class="fas fa-check"></i> Berhasil!';
                    submitBtn.style.background = 'var(--success)';
                    
                    setTimeout(() => {
                        sessionStorage.setItem('user', JSON.stringify(data.user));
                        sessionStorage.setItem('isLoggedIn', 'true');
                        window.location.href = 'index.html';
                    }, 800);
                } else {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalBtnContent;
                    loginError.classList.add('show');
                    // Shake animation for error
                    document.querySelector('.login-card').classList.add('shake');
                    setTimeout(() => document.querySelector('.login-card').classList.remove('shake'), 500);
                }
            } catch (error) {
                console.error('Login error:', error);
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalBtnContent;
                document.getElementById('errorMessage').textContent = 'Terjadi kesalahan. Pastikan server sedang berjalan!';
                loginError.classList.add('show');
            }
        });

        // Clear error when typing
        document.getElementById('username').addEventListener('input', () => {
            loginError.classList.remove('show');
        });
        document.getElementById('password').addEventListener('input', () => {
            loginError.classList.remove('show');
        });
    </script>
</body>
</html>
